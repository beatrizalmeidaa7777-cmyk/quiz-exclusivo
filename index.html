<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff1166; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; 
            background-color: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        
        /* Fundo Ajustado para não esticar e mostrar mais */
        #bg-image { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; 
            background-position: center 20%; /* Ajusta para não cortar o topo */
            transition: opacity 0.5s ease; 
            z-index: -2; 
        }

        /* Overlay mais sutil */
        .overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.85) 100%); 
            z-index: -1; 
        }
        
        #prog-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 100; }
        #bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }

        /* Container mais baixo e compacto */
        #main-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            padding: 20px 20px 30px 20px;
            background: rgba(10, 10, 10, 0.85); /* Mais transparente */
            backdrop-filter: blur(5px);
            border-top: 2px solid var(--primary);
            border-radius: 25px 25px 0 0;
            text-align: center;
            z-index: 10;
        }

        h2 { 
            color: #fff; 
            font-size: 1rem; /* Diminuído para sobrar espaço */
            font-weight: 800; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }

        .opt-btn { 
            display: block; 
            width: 100%; 
            padding: 14px; /* Mais compacto */
            margin-bottom: 8px; 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            font-size: 0.85rem; 
            font-weight: 600; 
            cursor: pointer;
        }

        .opt-btn:active { background: var(--primary); border-color: var(--primary); }

        .final-btn { 
            text-decoration: none; 
            display: block; 
            padding: 16px; 
            margin-top: 10px; 
            border-radius: 12px; 
            color: #fff; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 0.9rem;
        }

        #btn-pack { background: var(--primary); }
        #btn-call { background: var(--whatsapp); }

        .price { display: block; font-size: 0.75rem; font-weight: 400; opacity: 0.9; margin-top: 2px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="prog-container"><div id="bar"></div></div>
    <div id="bg-image"></div>
    <div class="overlay"></div>

    <div id="main-container">
        <div id="q-area">
            <h2 id="q-text">Carregando...</h2>
            <div id="o-btns"></div>
        </div>
        <div id="r-area" class="hidden">
            <h2 style="color: var(--primary); font-size: 1.2rem;">🔥 ACESSO LIBERADO!</h2>
            <p style="color:#fff; font-size:0.8rem; margin-bottom:15px;">Escolha como me ter agora:</p>
            <a href="https://seguropagamentos.com.br/ladeia-be2" class="final-btn" id="btn-pack">📸 VER MEU PACK VIP <span class="price">R$ 8,74</span></a>
            <a href="https://seguropagamentos.com.br/ladeia-be" class="final-btn" id="btn-call">📞 MEU WHATSAPP <span class="price">R$ 12,87</span></a>
        </div>
    </div>

    <script>
        const qs = [
            { q: "Como prefere passar o tempo comigo?", opts: ["Observando em silêncio", "Trocando segredos"], img: "https://i.ibb.co/27XZ5vgw/image.png" },
            { q: "O que mais te atiça?", opts: ["O que eu escondo", "Falar o que faria comigo"], img: "https://i.ibb.co/Sw6xHqs8/image.png" },
            { q: "Você tem atitude?", opts: ["Muita, quero agora", "Gosto que você mande"], img: "https://i.ibb.co/CKJZR0Ly/image.png" },
            { q: "Se tivéssemos 10 minutos agora...", opts: ["Vídeos proibidos", "Vídeo chamada"], img: "https://i.ibb.co/Gf4Kgk0Y/image.png" },
            { q: "Pronto para entrar no meu mundo?", opts: ["Sim, libera tudo!", "Sim, quero você!"], img: "https://i.ibb.co/Fkg7823p/image.png" }
        ];
        const imgFinal = "https://i.ibb.co/S4ZKRPgh/image.png";
        
        let step = 0;
        const bg = document.getElementById('bg-image');

        function load() {
            if (step < qs.length) {
                const data = qs[step];
                document.getElementById('q-text').innerText = data.q;
                
                // Pré-carregamento para evitar fundo preto
                const tempImg = new Image();
                tempImg.src = data.img;
                tempImg.onload = () => {
                    bg.style.backgroundImage = `url('${data.img}')`;
                    bg.style.opacity = 1;
                };

                const div = document.getElementById('o-btns'); div.innerHTML = '';
                data.opts.forEach(o => {
                    const b = document.createElement('button'); b.innerText = o; b.className = 'opt-btn';
                    b.onclick = () => { step++; load(); }; div.appendChild(b);
                });
                document.getElementById('bar').style.width = ((step + 1) / qs.length * 100) + '%';
            } else {
                document.getElementById('q-area').classList.add('hidden');
                document.getElementById('r-area').classList.remove('hidden');
                bg.style.backgroundImage = `url('${imgFinal}')`;
            }
        }
        window.onload = load;
    </script>
</body>
</html>
