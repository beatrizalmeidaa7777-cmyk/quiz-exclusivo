<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Exclusivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff1166; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; 
            background-color: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        
        #bg-image { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-size: contain; /* ALTERADO: Agora a foto se ajusta sem esticar e sem perder qualidade */
            background-repeat: no-repeat;
            background-color: #000;
            background-position: center top; 
            transition: opacity 0.4s ease; 
            z-index: -2; 
        }

        .overlay { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,1) 95%); 
            z-index: -1; 
        }
        
        #prog-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 100; }
        #bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }

        /* Container ULTRA COMPACTO para não tampar nada */
        #main-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            padding: 15px 20px 25px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid var(--primary);
            border-radius: 20px 20px 0 0;
            text-align: center;
            z-index: 10;
        }

        h2 { color: #fff; font-size: 0.9rem; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; }

        .opt-btn { 
            display: block; width: 100%; padding: 12px; margin-bottom: 8px; 
            border: 1px solid var(--primary); border-radius: 10px;
            background: rgba(255, 255, 255, 0.05); color: #fff; 
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }

        .final-btn { 
            text-decoration: none; display: block; padding: 15px; margin-top: 8px; 
            border-radius: 10px; color: #fff; font-weight: 800; 
            text-transform: uppercase; font-size: 0.9rem;
        }

        #btn-pack { background: var(--primary); }
        #btn-call { background: var(--whatsapp); }

        .price { display: block; font-size: 0.7rem; font-weight: 400; opacity: 0.9; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="prog-container"><div id="bar"></div></div>
    <div id="bg-image"></div>
    <div class="overlay"></div>

    <div id="main-container">
        <div id="q-area">
            <h2 id="q-text">Aguarde...</h2>
            <div id="o-btns"></div>
        </div>
        <div id="r-area" class="hidden">
            <h2 style="color: var(--primary);">🔥 ACESSO LIBERADO!</h2>
            <a href="https://seguropagamentos.com.br/ladeia-be2" class="final-btn" id="btn-pack">📸 VER MEU PACK VIP <span class="price">R$ 8,74</span></a>
            <a href="https://seguropagamentos.com.br/ladeia-be" class="final-btn" id="btn-call">📞 MEU WHATSAPP <span class="price">R$ 12,87</span></a>
        </div>
    </div>

    <script>
        const qs = [
            { q: "Como prefere passar o tempo comigo?", opts: ["Em silêncio", "Trocando segredos"], img: "https://i.ibb.co/27XZ5vgw/image.png" },
            { q: "O que mais te atiça?", opts: ["O que eu escondo", "O que eu faria com você"], img: "https://i.ibb.co/Sw6xHqs8/image.png" },
            { q: "Você tem atitude?", opts: ["Muita, quero agora", "Gosto que você mande"], img: "https://i.ibb.co/CKJZR0Ly/image.png" },
            { q: "Se tivéssemos 10 minutos agora...", opts: ["Vídeos proibidos", "Vídeo chamada"], img: "https://i.ibb.co/Gf4Kgk0Y/image.png" },
            { q: "Pronto para ver meu lado privado?", opts: ["Libera tudo!", "Quero você!"], img: "https://i.ibb.co/Fkg7823p/image.png" }
        ];
        const imgFinal = "https://i.ibb.co/S4ZKRPgh/image.png";
        
        let step = 0;
        const bg = document.getElementById('bg-image');

        function load() {
            if (step < qs.length) {
                const data = qs[step];
                document.getElementById('q-text').innerText = data.q;
                
                const tempImg = new Image();
                tempImg.src = data.img;
                tempImg.onload = () => {
                    bg.style.backgroundImage = `url('${data.img}')`;
                    bg.style.opacity = 1;
                };

                const div = document.getElementById('o-btns'); div.innerHTML = '';
                data.opts.forEach(o => {
                    const b = document.createElement('button'); b.innerText = o; b.className = 'opt-btn';
                    b.onclick = () => { step++; load(); }; div.appendChild(b);
                });
                document.getElementById('bar').style.width = ((step + 1) / qs.length * 100) + '%';
            } else {
                document.getElementById('q-area').classList.add('hidden');
                document.getElementById('r-area').classList.remove('hidden');
                bg.style.backgroundImage = `url('${imgFinal}')`;
            }
        }
        window.onload = load;
    </script>
</body>
</html>
